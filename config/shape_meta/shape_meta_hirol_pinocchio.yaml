io:
  input: data/train_episode/Ft_test_data_h5
  output: data/train_episode/Ft_test_data_lerobotv3
  repo_id: ft_test_data_lerobotv3
  max_episodes: null
  no_videos: true
  push_to_hub: false

task: ft_test
master_timestamp_path: teleop/timestamp_us

features:
  observation.ee_state.ee_pose:
    dtype: float32
    shape: [4, 4]
    h5_path: teleop/ee_pose
    timestamp_path: teleop/timestamp_us
    align: nearest

  observation.ee_state.gripper:
    dtype: int8
    shape: [1]
    h5_path: teleop/gripper_state
    timestamp_path: teleop/timestamp_us
    align: nearest

  observation.joint:
    dtype: float32
    shape: [7]
    h5_path: teleop/q_follower
    timestamp_path: teleop/timestamp_us
    align: nearest

  observation.velocity:
    dtype: float32
    shape: [7]
    h5_path: teleop/dq_follower
    timestamp_path: teleop/timestamp_us
    align: nearest

  observation.acceleration:
    dtype: float32
    shape: [7]
    h5_path: teleop/ddq_follower
    timestamp_path: teleop/timestamp_us
    align: nearest

  observation.torque:
    dtype: float32
    shape: [7]
    h5_path: teleop/tau_ext
    timestamp_path: teleop/timestamp_us
    align: nearest

  observation.ft_window:
    dtype: float32
    shape: [6]
    h5_path: force_sensor/wrench_filtered
    timestamp_path: force_sensor/timestamp_us
    align: nearest

  action.ee_pose:
    dtype: float32
    shape: [4, 4]
    h5_path: teleop/ee_pose
    timestamp_path: teleop/timestamp_us
    align: nearest

  action.gripper_state:
    dtype: int8
    shape: [1]
    h5_path: teleop/gripper_state
    timestamp_path: teleop/timestamp_us
    align: nearest
