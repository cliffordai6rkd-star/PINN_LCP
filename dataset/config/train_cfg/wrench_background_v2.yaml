dataloader:
  repo_id: wrench_bg_lerobotv3_dv
  root: data/train_episode/wrench_background/wrench_bg_lerobotv3_dv
  load_images: false
  video_backend: torchcodec
  normalize_mode: gaussian
  horizon: 1
  lowdim_keys:
    q: observation.joint                     #q
    v: observation.velocity                  #v
    a: observation.acceleration
    ee_pose: action.ee_pose                  #u             
    wrench: observation.ft_window            #lambda
  # image_keys:
  #   wrist: observation.images.wrist
  #   side_1: observation.images.side_1
  #   side_2: observation.images.side_2
  normalize_lowdim_keys: 
    - q 
    - v
    - a
    - ee_pose 
    - wrench

model:
  input_dims:
    q: 7
    v: 7
    a: 7
    ee_pose: 7
  static_inputs:
    - q
    - ee_pose
  dynamic_inputs:
    - q
    - ee_pose
    - v
    - a

train:
  hidden_dim: 192
  activation: silu
  use_norm: True
  dropout: 1e-3
  static_num_res_blocks: 3
  dynamic_num_res_blocks: 3

  scheduler:
    name: reduce_on_plateau
    factor: 0.5
    patience: 10
    min_lr: 1e-10

  batch_size: 512
  device: cuda:0
  num_workers: 8
  val_ratio: 0.05
  seed: 42
  lr: 1e-4
  weight_decay: 1e-4
  num_epochs: 250
  output_dir: outputs/wrench_bg/v2/exp13
  top_k: 3
  
