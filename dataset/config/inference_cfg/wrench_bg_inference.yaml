# 推理用：
dataloader:
  repo_id: wrench_bg_lerobotv3_dv
  root: data/train_episode/wrench_background/wrench_bg_lerobotv3_dv
  # repo_id: wrench_bg_lerobotv3
  # root: data/train_episode/wrench_background/wrench_bg_lerobotv3
  load_images: false
  video_backend: torchcodec
  normalize_mode: gaussian
  horizon: 1
  lowdim_keys:
    q: observation.joint                     #q
    v: observation.velocity                  #v
    a: observation.acceleration
    ee_pose: action.ee_pose                  #u             
    wrench: observation.ft_window            #lambda
  # image_keys:
  #   wrist: observation.images.wrist
  #   side_1: observation.images.side_1
  #   side_2: observation.images.side_2
  normalize_lowdim_keys: 
    - q 
    - v
    - a
    - ee_pose 
    - wrench

model:
  input_dims:
    q: 7
    v: 7
    a: 7
    ee_pose: 7
  static_inputs:
    - q
    - ee_pose
  dynamic_inputs:
    - q
    - ee_pose
    - v
    - a

inferencer:
  # ckpt_path: outputs/wrench_bg/v2/exp3/checkpoints/epoch_290_val_loss_0.0531.pt
  ckpt_path: outputs/wrench_bg/v2/exp11/checkpoints/epoch_046_val_loss_0.0555.pt